name: CI - Host

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install
      - run: npm run build --workspace @mf/host
      - run: npm run test --workspace @mf/host
      - run: docker build -t mf-host ./apps/host
